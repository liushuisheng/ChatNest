name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node -e "const v=require('./package.json').version; if (process.env.RELEASE_TAG !== 'v'+v) { console.error('Tag '+process.env.RELEASE_TAG+' does not match package version v'+v); process.exit(1) }"

  package:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: win
            arch: x64
            channel: latest
          - runner: windows-latest
            platform: win
            arch: arm64
            channel: latest-arm64
          - runner: macos-14
            platform: mac
            arch: x64
            channel: latest
          - runner: macos-14
            platform: mac
            arch: arm64
            channel: latest-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build renderer
        run: npm run build

      - name: Build Windows package
        if: matrix.platform == 'win'
        run: npx electron-builder --win --${{ matrix.arch }} --config.publish.channel=${{ matrix.channel }} --publish never

      - name: Build macOS package
        if: matrix.platform == 'mac'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --${{ matrix.arch }} --config.publish.channel=${{ matrix.channel }} --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/*.dmg
            release/*.zip
            release/*.zip.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: installers-*
          path: assets
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${{ github.ref_name }}" assets/* --verify-tag --generate-notes --title "ChatNest ${{ github.ref_name }}"
