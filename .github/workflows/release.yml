name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node -e "const v=require('./package.json').version; if (process.env.RELEASE_TAG !== 'v'+v) { console.error('Tag '+process.env.RELEASE_TAG+' does not match package version v'+v); process.exit(1) }"

  package:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: win
            arch: x64
            channel: latest
          - runner: windows-latest
            platform: win
            arch: arm64
            channel: latest-arm64
          - runner: macos-14
            platform: mac
            arch: x64
            channel: latest
          - runner: macos-14
            platform: mac
            arch: arm64
            channel: latest-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build renderer
        run: npm run build

      - name: Build Windows package
        if: matrix.platform == 'win'
        run: npx electron-builder --win --${{ matrix.arch }} --config.publish.channel=${{ matrix.channel }} --publish never

      - name: Build macOS package
        if: matrix.platform == 'mac'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --${{ matrix.arch }} --config.publish.channel=${{ matrix.channel }} --publish never

      - name: Enforce Gitee attachment limit
        run: node .github/scripts/check-release-size.mjs release

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/*.dmg
            release/*.zip
            release/*.zip.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: package
    runs-on: ubuntu-latest
    env:
      GITEE_ENABLED: ${{ secrets.GITEE_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: installers-*
          path: assets
          merge-multiple: true

      - name: Check Gitee attachment limit
        id: gitee-size
        run: node .github/scripts/check-release-size.mjs assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${{ github.ref_name }}" assets/* --verify-tag --generate-notes --title "ChatNest ${{ github.ref_name }}"

      - name: Warn when Gitee token is unavailable
        if: steps.gitee-size.outputs.eligible == 'true' && env.GITEE_ENABLED != 'true'
        run: echo "::warning title=Gitee sync skipped::GITEE_TOKEN is not configured; GitHub Release was published successfully."

      - name: Sync release tag to Gitee
        if: steps.gitee-size.outputs.eligible == 'true' && env.GITEE_ENABLED == 'true'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USER: liushuisheng
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          git remote add gitee https://gitee.com/liushuisheng/ChatNest.git
          git config --global credential.helper "!f() { echo username=$GITEE_USER; echo password=$GITEE_TOKEN; }; f"
          git push gitee "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"

      - name: Publish Gitee installers
        if: steps.gitee-size.outputs.eligible == 'true' && env.GITEE_ENABLED == 'true'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: liushuisheng
          GITEE_REPO: ChatNest
          RELEASE_TAG: ${{ github.ref_name }}
          TARGET_COMMITISH: ${{ github.sha }}
        run: node .github/scripts/publish-gitee-installers.mjs assets
