name: Build macOS Intel test package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm version 0.2.5-beta.1 --no-git-tag-version
      - run: npm run build
      - name: Package unsigned Intel app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: ChatNest-0.2.5-beta.1-mac-intel
          path: |
            release/*-mac-x64.dmg
            release/*-mac-x64.zip
          if-no-files-found: error
          retention-days: 7
