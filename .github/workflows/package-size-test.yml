name: Verify package sizes

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: win
            arch: x64
          - runner: windows-latest
            platform: win
            arch: arm64
          - runner: macos-14
            platform: mac
            arch: x64
          - runner: macos-14
            platform: mac
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package Windows
        if: matrix.platform == 'win'
        run: npx electron-builder --win --${{ matrix.arch }} --publish never
      - name: Package macOS
        if: matrix.platform == 'mac'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never
      - name: Enforce Gitee attachment limit
        run: node .github/scripts/check-release-size.mjs release
      - uses: actions/upload-artifact@v4
        with:
          name: size-test-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: error
          retention-days: 3
