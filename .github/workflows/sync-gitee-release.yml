name: Sync release to Gitee

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to copy from GitHub
        required: true
        default: v0.2.4
      cleanup:
        description: Delete the incomplete Gitee release instead of uploading
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download GitHub release assets
        if: inputs.cleanup != true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release download "${{ inputs.tag }}" --dir assets
      - name: Publish Gitee release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: liushuisheng
          GITEE_REPO: ChatNest
          RELEASE_TAG: ${{ inputs.tag }}
          TARGET_COMMITISH: ${{ inputs.tag }}
          GITEE_DELETE_RELEASE: ${{ inputs.cleanup }}
        run: node .github/scripts/publish-gitee-release.mjs assets
